---
name: Caddy
version: "0.3.3"
slug: caddy
description: Caddy reverse proxy with automatic Let's Encrypt certificates
url: https://github.com/ad/ha-caddy
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
startup: services
init: false
hassio_api: true
host_network: false
ingress: true
ingress_port: 8099
panel_icon: mdi:lock-outline
panel_title: Caddy
ports:
  "80/tcp": 80
  "443/tcp": 443
  "443/udp": 443
ports_description:
  "80/tcp": HTTP (ACME HTTP-01 challenge)
  "443/tcp": HTTPS
  "443/udp": HTTP/3 (QUIC)
map:
  - addon_config:rw
backup_exclude:
  - "caddy/locks"
  - "logs"
options:
  email: ""
  log_level: info
  access_log: true
  access_log_roll_size_mb: 10
  access_log_roll_keep: 5
  proxies:
    - domain: example.duckdns.org
      upstream: 192.168.1.10:8080
      security_headers: true
      routes: []
  extra_caddyfile: ""
schema:
  email: "email?"
  log_level: "list(debug|info|warn|error)?"
  access_log: "bool?"
  access_log_roll_size_mb: "int(1,1000)?"
  access_log_roll_keep: "int(1,100)?"
  proxies:
    - domain: "str"
      upstream: "str?"
      tls: "bool?"
      security_headers: "bool?"
      rate_limit_events: "int(1,1000000)?"
      rate_limit_window: "str?"
      routes:
        - path: "str"
          upstream: "str"
  extra_caddyfile: "str?"
